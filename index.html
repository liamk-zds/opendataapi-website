<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Webpage</title>
    <style>
        /* CSS: The "Paint and Decor" */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f9;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background: #2980b9;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to Open Data API Australia</h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>Coming Soon</h2>
            <img src="construction.gif"
              alt="Under Construction" 
              style="width: 100%; max-width: 300px; border-radius: 8px; margin-bottom: 1rem;">
            <p></p>
        </div>
    </div>

    <footer></footer>

    <script>
        // JavaScript: The "Logic"
        function greet() {
            alert("Hello! Your website is officially alive.");
        }
    </script>

</body>
</html>
